spring:
  application:
    name: BloomSchool

  datasource:
    url: jdbc:postgresql://localhost:5432/bloomschool_db
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: solutions.synapsetech@gmail.com
    password: 'lgcm whon pnpo qjxm'
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 9093
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  jwt:
    # Base64-encoded secret — override via JWT_SECRET env var in production
    secret: ${JWT_SECRET:Ymxvb21zY2hvb2wtc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi0yMDI1}
    expiration-ms: ${JWT_EXPIRY:86400000}

logging:
  level:
    com.bloom.bloomschool: DEBUG
    org.springframework.web: INFO

mpesa:
  # Sandbox: https://sandbox.safaricom.co.ke  Production: https://api.safaricom.co.ke
  base-url: ${MPESA_BASE_URL:https://sandbox.safaricom.co.ke}
  oauth-path: /oauth/v1/generate?grant_type=client_credentials
  stk-push-path: /mpesa/stkpush/v1/processrequest
  stk-query-path: /mpesa/stkpushquery/v1/query
  c2b-register-path: /mpesa/c2b/v1/registerurl
  # Paybill number funds are received on (fee payments use this as the account-carrying shortcode)
  shortcode: ${MPESA_SHORTCODE:}
  # Only set if STK push uses a different shortcode from the paybill above
  stk-shortcode: ${MPESA_STK_SHORTCODE:}
  passkey: ${MPESA_PASSKEY:}
  consumer-key: ${MPESA_CONSUMER_KEY:}
  consumer-secret: ${MPESA_CONSUMER_SECRET:}
  # Public HTTPS base URL this backend is reachable at (e.g. via ngrok in dev, or your real domain in prod)
  callback-base-url: ${MPESA_CALLBACK_BASE_URL:https://example.com/api}
  stk-callback-path: /payments/mpesa/stk-callback
  validation-path: /payments/mpesa/c2b/validation
  confirmation-path: /payments/mpesa/c2b/confirmation
  # Safaricom's published callback source IPs — leave empty to disable IP filtering (e.g. sandbox testing)
  whitelist: ${MPESA_IP_WHITELIST:}

banks:
  equity:
    enabled: ${EQUITY_ENABLED:false}
    base-url: ${EQUITY_BASE_URL:}
    api-key: ${EQUITY_API_KEY:}
    api-secret: ${EQUITY_API_SECRET:}
    merchant-code: ${EQUITY_MERCHANT_CODE:}
    signature-secret: ${EQUITY_SIGNATURE_SECRET:}
    signature-header: Signature
  kcb:
    enabled: ${KCB_ENABLED:false}
    base-url: ${KCB_BASE_URL:}
    api-key: ${KCB_API_KEY:}
    api-secret: ${KCB_API_SECRET:}
    merchant-code: ${KCB_MERCHANT_CODE:}
    signature-secret: ${KCB_SIGNATURE_SECRET:}
    signature-header: Signature
  coop:
    enabled: ${COOP_ENABLED:false}
    base-url: ${COOP_BASE_URL:}
    api-key: ${COOP_API_KEY:}
    api-secret: ${COOP_API_SECRET:}
    merchant-code: ${COOP_MERCHANT_CODE:}
    signature-secret: ${COOP_SIGNATURE_SECRET:}
    signature-header: Signature
